version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: smart_mgmt_db
    restart: always
    environment:
      MYSQL_DATABASE: smart_mgmt_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: smart_mgmt_backend
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=smart_mgmt_db
      - DB_USER=root
      - DB_PASSWORD=root
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: smart_mgmt_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
